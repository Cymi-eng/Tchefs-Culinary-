<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration | TChefs Culinary Institute</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0A2E5D",
              secondary: "#123F7A",
              accent: "#E31B23",
            },
          },
        },
      };
    </script>

    <style>
      * {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <!-- NAVBAR -->

    <nav class="bg-white shadow-md">
      <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
          <div class="flex items-center gap-3">
            <img
              src="assets/images/official-top-chef-logo.webp"
              alt="TChefs Logo"
              class="h-14"
            />

            <div>
              <h1 class="text-2xl font-bold text-primary">TChefs</h1>

              <p class="text-xs text-accent">Culinary Institute</p>
            </div>
          </div>

          <a
            href="index.html"
            class="text-primary font-semibold hover:text-accent transition"
          >
            Back Home
          </a>
        </div>
      </div>
    </nav>

    <!-- SIGNUP SECTION -->

    <section class="py-16">
      <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl mx-auto">
          <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- HEADER -->

            <div class="bg-primary text-white text-center p-8">
              <i class="fas fa-user-graduate text-5xl"></i>

              <h2 class="text-3xl font-bold mt-4">Student Registration</h2>

              <p class="mt-2 text-gray-300">
                Create your student account to begin your application.
              </p>
            </div>

            <!-- FORM -->

            <form id="signupForm" class="p-8 space-y-6">
              <div>
                <label class="block mb-2 font-medium"> Full Name </label>

                <input
                  type="text"
                  id="fullname"
                  placeholder="Enter your full name"
                  class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                  required
                />
              </div>

              <div>
                <label class="block mb-2 font-medium"> Email Address </label>

                <input
                  type="email"
                  id="email"
                  placeholder="Enter your email"
                  class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                  required
                />
              </div>

              <div>
                <label class="block mb-2 font-medium"> Phone Number </label>

                <input
                  type="tel"
                  id="phone"
                  placeholder="+254..."
                  class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                  required
                />
              </div>

              <div>
                <label class="block mb-2 font-medium">
                  Course Interested In
                </label>

                <select
                  id="course"
                  class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                  required
                >
                  <option value="">Select Course</option>

                  <option>Professional Culinary Arts</option>

                  <option>Pastry & Bakery Arts</option>

                  <option>Food Production</option>

                  <option>Hospitality Management</option>
                </select>
              </div>

              <div>
                <label class="block mb-2 font-medium"> Password </label>

                <input
                  type="password"
                  id="password"
                  placeholder="Create password"
                  class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                  required
                />
              </div>

              <div>
                <label class="block mb-2 font-medium"> Confirm Password </label>

                <input
                  type="password"
                  id="confirmPassword"
                  placeholder="Confirm password"
                  class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                  required
                />
              </div>

              <button
                type="submit"
                class="w-full bg-accent text-white py-4 rounded-lg font-semibold hover:bg-red-700 transition"
              >
                Create Account
              </button>
            </form>

            <!-- FOOTER -->

            <div class="bg-gray-50 p-6 text-center">
              <p class="text-gray-600">Already have an account?</p>

              <a
                href="login.html"
                class="text-primary font-semibold hover:text-accent"
              >
                Login Here
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="auth.js"></script>
  </body>
</html>
