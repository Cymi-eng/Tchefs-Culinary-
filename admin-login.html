<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | TChefs Culinary Institute</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#0A2E5D", accent: "#E31B23" },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            sans:    ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; }
    input:focus {
      outline: none;
      border-color: #0A2E5D;
      box-shadow: 0 0 0 3px rgba(10,46,93,0.08);
    }
  </style>
</head>

<body class="min-h-screen bg-gray-50 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-20">
        <a href="index.html" class="flex items-center gap-3">
          <img src="assets/images/official-top-chef-logo.webp" alt="TChefs" class="h-12 w-auto" />
          <div>
            <p class="text-2xl font-display font-bold text-primary leading-none">TChefs.</p>
            <p class="text-xs font-medium text-accent tracking-widest uppercase mt-0.5">Admin Portal</p>
          </div>
        </a>
        <a href="index.html" class="text-sm font-semibold text-gray-500 hover:text-primary transition">
          ← Back to Site
        </a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md">

      <!-- Card -->
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">

        <!-- Header -->
        <div class="bg-primary px-10 py-10 text-center">
          <!-- Simple shield shape using CSS borders — no icons -->
          <div class="w-14 h-14 rounded-xl bg-white/10 flex items-center justify-center mx-auto mb-4">
            <div class="w-6 h-7 border-2 border-white rounded-sm relative">
              <div class="absolute top-1.5 left-1 right-1 h-px bg-white opacity-60"></div>
              <div class="absolute top-3 left-1 right-1 h-px bg-white opacity-60"></div>
            </div>
          </div>
          <h1 class="font-display text-2xl font-bold text-white">Admin Login</h1>
          <p class="text-white/60 text-sm mt-2">Sign in to the TChefs admin dashboard</p>
        </div>

        <!-- Form -->
        <form id="adminLoginForm" class="px-10 py-8 space-y-5">

          <!-- Error banner — hidden until needed -->
          <div id="loginError" class="hidden bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700 font-medium"></div>

          <!-- Email -->
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Email Address</label>
            <input
              type="email"
              id="adminEmail"
              placeholder="admin@tchefs.ac.ke"
              required
              class="w-full px-4 py-3.5 rounded-lg border border-gray-200 text-sm bg-gray-50 transition"
            />
          </div>

          <!-- Password -->
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Password</label>
            <div class="relative">
              <input
                type="password"
                id="adminPassword"
                placeholder="Enter your password"
                required
                class="w-full px-4 py-3.5 rounded-lg border border-gray-200 text-sm bg-gray-50 transition pr-14"
              />
              <!-- Show / hide password toggle -->
              <button
                type="button"
                id="togglePw"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-semibold text-gray-400 hover:text-primary transition"
              >Show</button>
            </div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-accent hover:bg-red-700 transition text-white font-semibold py-3.5 rounded-lg text-sm tracking-wide"
          >
            Login
          </button>

        </form>

        <!-- Footer -->
        <div class="border-t border-gray-100 bg-gray-50 px-10 py-5 text-center">
          <p class="text-gray-500 text-sm">
            Don't have an admin account?
            <a href="admin-signup.html" class="text-primary font-semibold hover:text-accent transition ml-1">
              Create Admin Account
            </a>
          </p>
        </div>

      </div>
    </div>
  </main>

  <script src="admin-auth.js"></script>
</body>
</html>
